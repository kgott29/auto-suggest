<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #pill{
            padding-left: 90%;
        }
        #home{
            text-align:center;
            margin-top: 100px;
        }
        .logo-wordmark{
            color:blue;
        }
        .tagline{
            color:gray;
        }
        .rounded{
            padding: 15px 15px 15px 45px;
            border-radius: 25px;
            width:50%;
        }
        .lens{
            position:relative;
            left:40px;
        }
        #suggest-icon{
            margin-top: 20px;
            border: 1px solid gray;
            width: 50%;
            margin-left: 25%;
            padding: 5px;
        }
        
    </style>

</head>
<body>
    <div>
        <span id="gear">&#x2699;</span>
        <span id="pill">&#x2022; Online | &#x23f0; - ms</span>
        <div id="home">
            <h1><span class="logo-wordmark">Being</span><span>Infinity </span></h1>
            <p class="tagline">One Million phrases. Four Algorithms. Prefix based Auto Suggest</p>
            <span>
                <span class="lens">&#128269;</span>
                <input class="rounded" id="search-box" type="text" placeholder="Start typing to search">
            </span>
            <div id="suggest-icon">
                <!-- <p>Suggestion Box</p> -->
            </div>

        </div>
    </div> 
    <script>
        var searchBox = document.getElementById("search-box");
        var suggestionBox = document.getElementById("suggest-icon");
        searchBox.addEventListener("input",function(){
            // 1: Get user value
            var userValue = searchBox.value;
            if(userValue.trim()===""){

            }
            else{
                var url1="https://autosuggest-backend.onrender.com/api/autosuggest?q=";
                var url3="&algorithm=brute&limit=10&weighted=false";
                var url = url1 + userValue + url3;
                // 2: Call API with user value to get suggestion
                fetch(url)
                .then(function(response){
                    return response.json();
                })
                .then(function(data){
                    console.log(data);
                    var resultsArray = data.results;
                    var htmlResults = "";
                    for(var i=0;i<resultsArray.length;i++){
                        htmlResults +="<div>" + resultsArray[i].text + "</div>";
                    }
                    // 3: Display data in HTML
                    suggestionBox.innerHTML = htmlResults;
                })
            }
            
        });
    </script>  
</body>
</html>
